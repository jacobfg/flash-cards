<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Italian" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Italian Flash Cards</title>
</head>
<body>
  <main id="app">
    <section id="home" class="home">
      <h1>Italian flash cards</h1>
      <p class="sub">Pick a direction</p>
      <button class="mode" data-mode="it">
        <span class="mode-flag">🇮🇹</span>
        <span class="mode-label">Italian → English</span>
        <span class="mode-sub">See Italian, reveal meaning</span>
      </button>
      <button class="mode" data-mode="en">
        <span class="mode-flag">🇬🇧</span>
        <span class="mode-label">English → Italian</span>
        <span class="mode-sub">See English, reveal translation</span>
      </button>
    </section>

    <section id="deck" class="deck" hidden>
      <div id="card" class="card" role="button" tabindex="0" aria-label="Tap to reveal translation">
        <div class="face front">
          <header class="card-header">
            <button id="home-btn" aria-label="Back to menu">←</button>
            <span id="counter">0 / 0</span>
          </header>
          <div class="hint" id="hint"></div>
          <div class="term" id="term">Loading…</div>
          <div class="sub" id="sub"></div>
          <button class="speak" id="speak" aria-label="Speak Italian">🔊</button>
        </div>
        <div class="face back">
          <header class="card-header">
            <button id="home-btn-back" aria-label="Back to menu">←</button>
            <span id="counter-back">0 / 0</span>
          </header>
          <div class="term" id="translation"></div>
          <div class="sub" id="sub-back"></div>
          <button class="speak" id="speak-back" aria-label="Speak Italian">🔊</button>
        </div>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
