<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Italian" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png?v=4" />
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png?v=4" />
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png?v=4" />
  <link rel="stylesheet" href="styles.css" />
  <title>Italian Flash Cards</title>
</head>
<body>
  <main id="app">
    <section id="home" class="home">
      <img class="avatar" src="avatar.png" alt="" onerror="this.style.display='none'" />
      <h1>Italian flash cards</h1>
      <p class="sub">Pick a direction</p>
      <button class="mode" data-mode="it">
        <span class="mode-flag">🇮🇹</span>
        <span class="mode-label">Italian → English</span>
        <span class="mode-sub">See Italian, reveal meaning</span>
      </button>
      <button class="mode" data-mode="en">
        <span class="mode-flag">🇬🇧</span>
        <span class="mode-label">English → Italian</span>
        <span class="mode-sub">See English, reveal translation</span>
      </button>
    </section>

    <section id="deck" class="deck" hidden>
      <div id="swipe-hint" class="swipe-hint">swipe to navigate</div>
      <div id="card" class="card" role="button" tabindex="0" aria-label="Tap to reveal translation">
        <div class="face front">
          <header class="card-header">
            <button class="home-btn" aria-label="Back to menu">←</button>
            <span class="lang-flag" aria-label="Italian">🇮🇹</span>
          </header>
          <div class="progress" aria-hidden="true"></div>
          <div class="hint" id="hint"></div>
          <div class="term" id="term">Loading…</div>
          <div class="sub" id="sub"></div>
          <footer class="card-footer">
            <button class="word-list" aria-label="Jump to word">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
              </svg>
            </button>
            <button class="speak" aria-label="Speak Italian">🔊</button>
          </footer>
        </div>
        <div class="face back">
          <header class="card-header">
            <button class="home-btn" aria-label="Back to menu">←</button>
            <span class="lang-flag" aria-label="Italian">🇮🇹</span>
          </header>
          <div class="progress" aria-hidden="true"></div>
          <div class="term" id="translation"></div>
          <div class="sub" id="sub-back"></div>
          <footer class="card-footer">
            <button class="word-list" aria-label="Jump to word">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
              </svg>
            </button>
            <button class="speak" aria-label="Speak Italian">🔊</button>
          </footer>
        </div>
      </div>

      <div id="sheet" class="sheet" hidden>
        <div class="sheet-backdrop" id="sheet-backdrop"></div>
        <div class="sheet-panel">
          <header class="sheet-header">
            <span class="sheet-title">Jump to word</span>
            <button class="sheet-close" id="sheet-close" aria-label="Close">✕</button>
          </header>
          <ul id="word-list" class="word-list-items"></ul>
        </div>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
